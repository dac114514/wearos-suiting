name: 构建随听 APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-debug:
    name: 构建 Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: 赋予 Gradle 执行权限
        run: chmod +x ./gradlew

      # 清理旧缓存，避免增量构建带入脏状态
      - name: 清理构建缓存
        run: ./gradlew clean

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-build-cache

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: suiting-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  build-release:
    name: 构建 Release APK（签名）
    runs-on: ubuntu-latest
    # 仅在推送 v* tag 时执行
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-debug

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: 赋予 Gradle 执行权限
        run: chmod +x ./gradlew

      - name: 清理构建缓存
        run: ./gradlew clean

      - name: 还原签名密钥库
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/suiting-release.jks

      - name: 构建并签名 Release APK
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/app/suiting-release.jks \
            -Pandroid.injected.signing.store.password=$KEY_STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace --no-build-cache

      - name: 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: suiting-release-${{ github.ref_name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          name: 随听 ${{ github.ref_name }}
          body: |
            ## 随听 ${{ github.ref_name }}

            Wear OS 音乐播放器，同时支持侧载到普通安卓手机调试。

            ### 安装到 Wear OS 手表
            ```bash
            adb install suiting-release-*.apk
            ```

            ### 安装到普通安卓手机（调试用）
            ```bash
            # 直接 adb 安装，APK 已声明 android.hardware.type.watch required=false
            adb install suiting-release-*.apk
            # 或在手机上开启"未知来源"后直接点击 APK 文件安装
            ```

            > 注意：UI 为圆形手表屏幕优化设计，在手机上可正常运行但布局为圆形。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
